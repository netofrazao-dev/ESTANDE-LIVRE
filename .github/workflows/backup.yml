# ═══════════════════════════════════════════════════════════════════
# Backup semanal do banco — roda de graça no GitHub, sem depender do
# seu computador estar ligado. Necessário porque o plano free do
# Supabase não inclui backup automático.
#
# Setup (uma vez só):
#   1. No GitHub, vá em Settings → Secrets and variables → Actions
#   2. Crie um secret chamado SUPABASE_DB_URL com o valor da sua
#      connection string (painel do Supabase → botão "Connect" no topo
#      → aba "Direct" → "Session pooler" → copie a URI, com a senha
#      real no lugar de [YOUR-PASSWORD] e o usuário no formato
#      postgres.SEU_PROJECT_REF, não só "postgres")
#   3. Pronto — o workflow já roda sozinho toda semana
#
# Os backups ficam disponíveis por 90 dias na aba "Actions" do repo,
# em "Artifacts". Baixe periodicamente e guarde em outro lugar (Google
# Drive, etc.) se quiser reter por mais tempo.
#
# Nota sobre a versão do pg_dump: o Ubuntu do GitHub Actions vem com
# Postgres 16 por padrão, mas o Supabase roda Postgres 17 — pg_dump
# recusa (por segurança) tirar backup de um servidor mais novo que ele
# mesmo. Por isso instalamos explicitamente o cliente 17 do repositório
# oficial da PostgreSQL antes de rodar o dump.
# ═══════════════════════════════════════════════════════════════════
name: Backup semanal do banco

on:
  schedule:
    - cron: '0 6 * * 1' # toda segunda-feira às 06h UTC (03h em Brasília)
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente PostgreSQL 17 (compatível com o servidor)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresqlorg.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: Gerar dump do banco
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" -F c -f "estante-livre-${TIMESTAMP}.dump"

      - name: Enviar como artefato
        uses: actions/upload-artifact@v4
        with:
          name: backup-estante-livre-${{ github.run_id }}
          path: '*.dump'
          retention-days: 90
